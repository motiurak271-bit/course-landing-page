<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি ফ্রিল্যান্সিং গাইডবুক</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="landing-container">
        <!-- বাম পাশ: হেডলাইন ও বর্ণনা -->
        <div class="content-side">
            <h1>মাত্র ৩০ দিনে ওয়েব ডিজাইন শিখে ফ্রিল্যান্সিং শুরু করুন!</h1>
            <p>আমাদের প্রিমিয়াম ই-বুকটি এখন পাচ্ছেন সম্পূর্ণ ফ্রি। নিচে আপনার তথ্য দিয়ে এখনই ডাউনলোড করে নিন।</p>
            <ul>
                <li>✓ ৫টি লাইভ প্রজেক্ট আইডিয়া</li>
                <li>✓ ক্লায়েন্ট পাওয়ার সিক্রেট টিপস</li>
                <li>✓ সোর্স কোড ও গাইডলাইন</li>
            </ul>
        </div>

        <!-- ডান পাশ: লিড ক্যাপচার ফর্ম -->
        <div class="form-side">
            <h2>ফ্রি ই-বুকটি পেতে ফর্মটি পূরণ করুন</h2>
            <form id="leadForm" action="https://formsubmit.co/mdmotiurrohmanronju238@gmail.com" method="POST">
                <div class="input-group">
                    <label for="name">আপনার নাম</label>
                    <input type="text" id="name" name="name" placeholder="যেমন: আবির রহমান">
                    <span class="error-msg" id="nameError"></span>
                </div>
                
                <div class="input-group">
                    <label for="email">ইমেইল অ্যাড্রেস</label>
                    <input type="email" id="email" name="email" placeholder="যেমন: name@example.com">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <button type="submit" class="cta-btn">আমার ফ্রি ই-বুকটি দিন</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
